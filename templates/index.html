<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | eBook Station</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-box {
            text-align: center;
            background: #fff;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
        }

        .welcome-box h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .welcome-box p {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .welcome-box a {
            display: inline-block;
            background-color: #ff5e62;
            color: white;
            padding: 12px 25px;
            margin: 10px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .welcome-box a:hover {
            background-color: #ff3b3f;
        }
    </style>
</head>
<body>

<div class="welcome-box">
    <h1>Welcome to eBook Station</h1>
    <p>Your one-stop platform to upload, browse, and download eBooks easily!</p>

    <a href="/login">Login</a>
    <a href="/register">Register</a>
</div>

</body>
</html>
