<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | eBook Station</title>

    <!-- CSS -->
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .admin-box {
            background: #fff;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .admin-box h2 {
            color: #333;
            margin-bottom: 30px;
        }

        .admin-box a {
            display: block;
            background-color: #667eea;
            color: white;
            text-decoration: none;
            padding: 12px 0;
            margin: 15px 0;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .admin-box a:hover {
            background-color: #5a67d8;
        }

        .logout-btn {
            background-color: #f44336;
        }

        .logout-btn:hover {
            background-color: #d32f2f;
        }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>Admin Dashboard</h2>

    <a href="/upload">Upload Book</a>
    <a class="logout-btn" href="/logout">Logout</a>
</div>

</body>
</html>
